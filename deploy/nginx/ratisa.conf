server {
  listen 80;
  server_name your-domain.example;

  root /var/www/ratisa/dist;
  index index.html;

  # Critical for OParl API access in browser:
  # this block must be above the generic "/" SPA block.
  location /oparl/ {
    proxy_pass https://buergerinfo.stadt-koeln.de/oparl/;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    proxy_buffering off;
    proxy_set_header Host buergerinfo.stadt-koeln.de;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Static assets and SPA fallback.
  location / {
    try_files $uri /index.html;
  }
}
